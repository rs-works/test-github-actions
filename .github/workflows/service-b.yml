name: service-b

on:
  workflow_run:
    workflows: ["service-a"]
    types: [completed]

jobs:
  check-paths:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-slim
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - id: check
        run: |
          CHANGED=$(gh api repos/${{ github.repository }}/compare/main...${{ github.event.workflow_run.head_sha }} \
            --jq '[.files[].filename | select(startswith("files/service-b/"))] | length > 0')
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  service-b:
    needs: check-paths
    if: needs.check-paths.outputs.changed == 'true'
    runs-on: ubuntu-slim
    steps:
      - run: sleep 10
